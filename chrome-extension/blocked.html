<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked — K9 Web Protection</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="card" id="card">
    <div class="icon" id="icon">🛡️</div>
    <h1 id="title">Site Blocked</h1>
    <p id="message"></p>
    <div class="domain" id="domain"></div>
    <div class="quote" id="quote" style="display:none"></div>
    <div class="actions">
      <button class="btn btn-back" onclick="history.back()">← Go Back</button>
      <button class="btn btn-allow" id="btn-allow" onclick="allowSite()">Allow this site</button>
    </div>
    <div class="footer">
      🛡️ K9 Web Protection &nbsp;·&nbsp;
      <a href="https://k9.khaleel.eu" target="_blank">k9.khaleel.eu</a>
    </div>
  </div>

  <script>
    const params     = new URLSearchParams(location.search)
    const blockedURL = params.get('url') || ''
    const reason     = params.get('reason') || 'adult'

    // Motivational quotes for social media blocks
    const QUOTES = [
      "Your future self will thank you for this moment of discipline.",
      "Every minute not scrolling is a minute invested in yourself.",
      "Champions are made in the moments when they want to quit — but don't.",
      "The less you respond to distractions, the more peace you will have.",
      "Small disciplines repeated daily lead to great achievements.",
      "Your goals don't care about your newsfeed.",
      "Discipline is choosing between what you want now and what you want most.",
      "Focus is the superpower of the 21st century.",
      "The successful warrior is the average person with laser-like focus.",
      "What you do today can improve all your tomorrows.",
    ]

    function randomQuote() {
      return QUOTES[Math.floor(Math.random() * QUOTES.length)]
    }

    // Configure page based on block reason
    if (reason === 'social') {
      document.title = 'Stay Focused — K9 Web Protection'
      document.getElementById('icon').textContent    = '📵'
      document.getElementById('title').textContent   = 'Stay Focused'
      document.getElementById('message').textContent = 'Social media is blocked. Use this time for something that matters.'
      document.getElementById('quote').style.display = 'block'
      document.getElementById('quote').textContent   = '"' + randomQuote() + '"'
      document.body.classList.add('social')
    } else if (reason === 'imgsearch') {
      document.getElementById('icon').textContent    = '🔍'
      document.getElementById('title').textContent   = 'Image Search Blocked'
      document.getElementById('message').textContent = 'Image and video search has been blocked by K9 Web Protection.'
    } else if (reason === 'keyword') {
      document.getElementById('icon').textContent    = '🔑'
      document.getElementById('title').textContent   = 'Keyword Match'
      document.getElementById('message').textContent = 'This URL matched a blocked keyword in K9 Web Protection.'
    } else {
      document.getElementById('message').textContent = 'This website has been blocked by K9 Web Protection.'
    }

    if (blockedURL) {
      try {
        document.getElementById('domain').textContent = new URL(blockedURL).hostname
      } catch (_) {}
    }

    function allowSite() {
      if (!blockedURL) return
      try {
        const host = new URL(blockedURL).hostname
        chrome.storage.local.get('userAllowlist', ({ userAllowlist = [] }) => {
          if (!userAllowlist.includes(host)) userAllowlist.push(host)
          chrome.runtime.sendMessage(
            { type: 'SAVE_SETTINGS', settings: { userAllowlist } },
            () => { window.location.href = blockedURL }
          )
        })
      } catch (_) {}
    }
  </script>
</body>
</html>
