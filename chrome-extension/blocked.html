<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked — K9 Web Protection</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <div class="card">
    <div class="icon"  id="icon">🛡️</div>
    <h1 id="title">Site Blocked</h1>
    <p  id="message"></p>
    <div class="domain" id="domain"></div>
    <div class="quote"  id="quote"></div>
    <div class="actions">
      <button class="btn btn-back"  onclick="history.back()">← Go Back</button>
      <button class="btn btn-allow" id="btn-allow" onclick="allowSite()">Allow this site</button>
    </div>
    <div class="footer">
      🛡️ K9 Web Protection &nbsp;·&nbsp;
      <a href="https://k9.khaleel.eu" target="_blank">k9.khaleel.eu</a>
    </div>
  </div>

<script>
// ── Social domain list (mirrors background.js) ────────────────────────────────
const SOCIAL_DOMAINS = [
  'facebook.com','fb.com','messenger.com','facebook.net',
  'instagram.com',
  'twitter.com','x.com','t.co',
  'reddit.com','redd.it',
  'tiktok.com','tiktokv.com',
  'youtube.com','youtu.be','youtube-nocookie.com',
  'snapchat.com',
  'pinterest.com','pin.it',
  'linkedin.com',
]

const QUOTES = [
  'Your future self will thank you for this moment of discipline.',
  'Every minute not scrolling is a minute invested in yourself.',
  'Champions are made in the moments they want to quit — but don\'t.',
  'The less you respond to distractions, the more peace you will have.',
  'Small disciplines repeated daily lead to great achievements.',
  'Your goals don\'t care about your newsfeed.',
  'Discipline is choosing between what you want now and what you want most.',
  'Focus is the superpower of the 21st century.',
  'The successful warrior is the average person with laser-like focus.',
  'What you do today can improve all your tomorrows.',
]

// ── Parse URL parameters ───────────────────────────────────────────────────────
const params     = new URLSearchParams(location.search)
const blockedURL = params.get('url') || ''

// Detect blocked host
let blockedHost = ''
try { blockedHost = new URL(blockedURL).hostname.toLowerCase() } catch (_) {}

// Determine reason: use param if present, otherwise infer from domain
function isSocial(host) {
  return SOCIAL_DOMAINS.some(d => host === d || host.endsWith('.' + d))
}
const reason = params.get('reason') ||
  (isSocial(blockedHost) ? 'social' : 'adult')

// ── Configure page ─────────────────────────────────────────────────────────────
if (blockedHost) {
  document.getElementById('domain').textContent = blockedHost
}

if (reason === 'social') {
  document.title = 'Stay Focused — K9 Web Protection'
  document.body.classList.add('social')
  document.getElementById('icon').textContent    = '📵'
  document.getElementById('title').textContent   = 'Stay Focused'
  document.getElementById('message').textContent =
    'Social media is blocked. Use this time for something that matters.'
  const q = document.getElementById('quote')
  q.textContent = '“' + QUOTES[Math.floor(Math.random() * QUOTES.length)] + '”'
  q.style.display = 'block'
} else if (reason === 'imgsearch') {
  document.getElementById('icon').textContent    = '🔍'
  document.getElementById('title').textContent   = 'Image Search Blocked'
  document.getElementById('message').textContent =
    'Image and video search is blocked by K9 Web Protection.'
} else if (reason === 'keyword') {
  document.getElementById('icon').textContent    = '🔑'
  document.getElementById('title').textContent   = 'Keyword Blocked'
  document.getElementById('message').textContent =
    'This URL matched a blocked keyword.'
} else {
  document.getElementById('message').textContent =
    'This website is blocked by K9 Web Protection.'
}

// ── Allow this site ────────────────────────────────────────────────────────────
// Uses chrome APIs directly — no message round-trip, so allow rule is
// guaranteed to be in place before we redirect.
async function allowSite() {
  if (!blockedHost) return
  const btn = document.getElementById('btn-allow')
  btn.textContent = 'Adding…'
  btn.disabled = true

  try {
    // 1. Update allowlist in storage
    const data = await chrome.storage.local.get('userAllowlist')
    const list = data.userAllowlist || []
    if (!list.includes(blockedHost)) list.push(blockedHost)
    await chrome.storage.local.set({ userAllowlist: list })

    // 2. Add an immediate allow rule via declarativeNetRequest
    const existing = await chrome.declarativeNetRequest.getDynamicRules()
    const maxId    = existing.length ? Math.max(...existing.map(r => r.id)) : 20000
    await chrome.declarativeNetRequest.updateDynamicRules({
      addRules: [{
        id: maxId + 1,
        priority: 10,
        action: { type: 'allow' },
        condition: { urlFilter: `||${blockedHost}`, resourceTypes: ['main_frame'] },
      }],
    })

    // 3. Tell background to do a full sync (persists for future sessions)
    chrome.runtime.sendMessage({ type: 'SAVE_SETTINGS', settings: { userAllowlist: list } })

    // 4. Navigate to the originally blocked URL
    window.location.href = blockedURL || '/'
  } catch (e) {
    console.error('K9 allowSite error:', e)
    btn.textContent = 'Error — try again'
    btn.disabled = false
  }
}
</script>
</body>
</html>
