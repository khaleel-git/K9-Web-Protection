
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#144985;--navy-dark:#0d3260;--navy-mid:#1a5ca8;--gold:#f0a500;--red:#cc3333;--green:#1a8a3a;--bg:#d4d0c8;--text:#222;--text-light:#555;--border:#b0b8c8}
.k9{font-family:'Inter',system-ui,sans-serif;background:var(--bg);padding:4px}
.k9-frame{background:#fff;border:1px solid #888;box-shadow:2px 2px 10px rgba(0,0,0,.2)}
.ico{display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ico svg{fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.k9-header{background:#fff;padding:6px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:3px solid #c0c0c0}
.k9-logo-area{display:flex;align-items:center;gap:10px}
.k9-logo{width:54px;height:54px;border-radius:50%;object-fit:contain;}
.k9-header h1{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.k9-logout-btn{display:flex;align-items:center;gap:5px;background:none;border:none;cursor:pointer;color:var(--red);font-size:11px;font-weight:600;font-family:'Inter',sans-serif}
.k9-logout-btn:hover{text-decoration:underline}

.k9-topnav{background:linear-gradient(180deg,#2a6cb8,var(--navy),var(--navy-dark));display:flex;padding:0 6px}
.k9-topnav button{background:none;border:none;color:rgba(255,255,255,.8);font-size:11px;font-weight:600;padding:7px 14px;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Inter',sans-serif;transition:color .15s}
.k9-topnav button:hover{color:#fff}
.k9-topnav button.active{color:var(--gold)}
.k9-topnav .ico{color:inherit}

.k9-body{display:flex;min-height:380px}
.k9-sidebar{width:185px;flex-shrink:0;background:#fff;border-right:1px solid #c0c0c0;display:flex;flex-direction:column}
.k9-sidebar-head{background:linear-gradient(180deg,#2a6cb8,var(--navy));padding:14px 10px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px}
.k9-sidebar-head .sh-ico{color:var(--gold)}
.k9-sidebar-head h3{color:#fff;font-size:13px;font-weight:800;letter-spacing:1.5px}
.k9-sidebar-links{padding:4px 0;background:#fff;flex:1}
.k9-sidebar-links button{width:100%;background:none;border:none;text-align:left;padding:5px 10px;font-size:11px;font-weight:600;color:var(--navy);cursor:pointer;display:flex;align-items:center;gap:7px;font-family:'Inter',sans-serif;border-left:3px solid transparent;transition:all .1s}
.k9-sidebar-links button:hover{background:#e8f0fa}
.k9-sidebar-links button.active{color:#8b0000;border-left-color:var(--gold);background:#faf8f4}
.k9-sidebar-links button .ico{color:var(--text-light)}
.k9-sidebar-links button.active .ico{color:#8b0000}

.k9-content{flex:1;background:#fff;padding:12px 16px;overflow-y:auto}
.view-header{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.view-header .ico{color:var(--navy)}
.view-header h2{font-size:16px;font-weight:700;color:var(--navy)}
.view-help{color:var(--navy-mid);font-size:10px;text-decoration:underline;cursor:pointer;margin-bottom:10px;display:block}

.k9-footer-bar{background:linear-gradient(180deg,var(--navy-mid),var(--navy-dark));padding:5px 14px;display:flex;justify-content:flex-end;align-items:center}
.brand-logo{display:flex;align-items:baseline;gap:0}
.brand-k{font-family:'Inter',sans-serif;font-size:14px;font-weight:900;color:#fff;letter-spacing:.3px}
.brand-star{color:var(--gold);font-size:12px;margin:0 2px}
.brand-sub{font-family:'Inter',sans-serif;font-size:9px;font-weight:600;color:#8bb8e8;letter-spacing:.5px;margin-left:3px}
.k9-footer-copy{background:#e8e8e0;text-align:center;padding:3px;font-size:9px;color:var(--text-light);border-top:1px solid #c0c0c0}

.k9-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;font-size:11px;font-weight:600;background:#f4f4f0;border:1px solid #a0a0a0;cursor:pointer;color:#333;font-family:'Inter',sans-serif;transition:background .1s}
.k9-btn:hover{background:#e0e0d8}
.btn-row{display:flex;justify-content:flex-end;gap:6px;margin-top:10px}

.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.dash-card{border:1px solid var(--border);padding:8px 10px}
.dash-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.dash-card-title{font-size:9px;font-weight:700;color:#777;text-transform:uppercase;letter-spacing:.5px}
.dash-card .ico{color:var(--border)}
.dash-card-value{font-size:22px;font-weight:900;color:var(--navy);line-height:1}
.dash-card-sub{font-size:9px;color:#999;margin-top:2px}
.dash-card.warn .dash-card-value{color:var(--red)}
.dash-card.highlight .dash-card-value{color:#c04400}

.dash-split{display:flex;gap:12px;margin-bottom:8px}
.dash-col{flex:1}
.dash-section-title{font-size:10px;font-weight:800;color:var(--navy);margin-bottom:4px;padding-bottom:3px;border-bottom:2px solid var(--navy);text-transform:uppercase;letter-spacing:.5px}
.prot-row{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid #eef0f4;font-size:11px}
.prot-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.prot-dot.on{background:var(--green);box-shadow:0 0 4px rgba(26,138,58,.4)}
.prot-dot.off{background:var(--red);box-shadow:0 0 4px rgba(204,51,51,.3)}
.prot-label{flex:1;font-weight:600;color:#333}
.prot-val{font-weight:700;font-size:10px}
.prot-val.active{color:var(--green)}
.prot-val.inactive{color:var(--red)}
.dash-db{display:flex;gap:4px;margin-bottom:8px}
.dash-db-chip{flex:1;background:#f0f4fa;border:1px solid var(--border);padding:6px;text-align:center}
.dash-db-num{font-size:13px;font-weight:900;color:var(--navy)}
.dash-db-label{font-size:7px;color:#777;text-transform:uppercase;letter-spacing:.5px;margin-top:1px}
.dash-bar-row{display:flex;align-items:center;gap:4px;margin-bottom:3px;font-size:10px}
.dash-bar-label{width:65px;text-align:right;color:var(--text-light);font-weight:600;flex-shrink:0}
.dash-bar-track{flex:1;height:11px;background:#eef0f4;border:1px solid #d0d4dc;overflow:hidden}
.dash-bar-fill{height:100%}
.dash-bar-val{width:30px;font-weight:700;color:#333;font-size:10px}
.dash-recent{margin-top:2px}
.dash-recent-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #f0f0f0;font-size:10px}
.dash-recent-time{width:42px;color:#999;font-weight:500;flex-shrink:0;font-variant-numeric:tabular-nums}
.dash-recent-url{flex:1;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dash-recent-cat{font-size:9px;font-weight:600;padding:1px 5px;border-radius:2px;flex-shrink:0}
.cat-porn{background:#fde8e8;color:#991b1b}
.cat-malware{background:#fef3e2;color:#92400e}
.cat-phish{background:#fefce8;color:#854d0e}
.cat-gamble{background:#e8f0fe;color:#1e40af}
.cat-violence{background:#f3e8fe;color:#6b21a8}
.dash-quick-actions{display:flex;gap:6px;margin-top:8px}
.dash-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:6px;background:#f4f7fb;border:1px solid var(--border);cursor:pointer;font-size:10px;font-weight:600;color:var(--navy);font-family:'Inter',sans-serif;transition:background .1s}
.dash-action-btn:hover{background:#e0ecfa}
.dash-action-btn .ico{color:var(--navy)}

.exc-split{display:flex;gap:10px}
.exc-box{flex:1;border:1px solid #a0a0a0}
.exc-head{padding:3px 8px;border-bottom:1px solid #c0c0c0}
.exc-head.block-head{background:#fdf6f6}
.exc-head.block-head .exc-title{color:#8b0000;font-size:12px;font-weight:700}
.exc-head.block-head .exc-sub{color:#8b0000;font-size:9px;font-weight:600;margin-left:4px}
.exc-head.allow-head{background:#f0faf0}
.exc-head.allow-head .exc-title{color:var(--green);font-size:12px;font-weight:700}
.exc-head.allow-head .exc-sub{color:var(--green);font-size:9px;font-weight:600;margin-left:4px}
.exc-body{padding:8px}
.exc-body label{font-size:11px;font-weight:600;color:#000;display:block;margin-bottom:3px}
.exc-body input[type=text]{width:100%;border:1px solid #888;padding:3px 5px;font-size:11px;margin-bottom:4px;font-family:'Inter',sans-serif}
.exc-add{display:flex;align-items:center;gap:3px;background:none;border:none;font-size:11px;color:var(--green);font-weight:700;cursor:pointer;float:right;font-family:'Inter',sans-serif}
.exc-list{clear:both;margin-top:8px;min-height:30px;font-size:10px;color:#888}
.exc-item{display:flex;justify-content:space-between;align-items:center;padding:2px 0;border-bottom:1px solid #e0e0e0;color:var(--text);font-size:11px}
.exc-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:14px;font-weight:700}
.blacklist-row{margin-top:8px;padding:6px;border:2px solid var(--red);background:#fff8f8;display:flex;align-items:center;gap:6px;font-size:10px;color:#333}
.cat-item{padding:5px 8px;border-bottom:1px solid #e8e8e8;cursor:pointer;display:flex;align-items:flex-start;gap:6px;font-size:11px}
.cat-item:hover{background:#f0f4fa}
.cat-item.sel{background:#faf6f0}
.cat-item input{margin-top:2px}
.cat-label{font-weight:700;color:#c04400}
.cat-label.blue{color:var(--navy)}
.cat-desc{color:var(--text-light);font-size:10px}
.cat-expand{background:#fff;border:1px solid #a0a0a0;margin-top:4px;padding:6px 8px}
.cat-expand-title{font-size:11px;font-weight:700;margin-bottom:4px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px 6px;font-size:10px}
.cat-grid span{color:#333;padding:1px 0}
.time-row{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #eee;font-size:11px}
.time-row label{width:70px;font-weight:600}
.time-input{border:1px solid #999;padding:2px 4px;font-size:10px;width:64px;font-family:'Inter',sans-serif}
.adv-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #eee;font-size:11px}
.adv-row label{font-weight:600;color:#333}
.adv-row select,.adv-row input{border:1px solid #999;padding:2px 5px;font-size:11px;font-family:'Inter',sans-serif}
.pw-form{max-width:320px}
.pw-field{margin-bottom:6px}
.pw-field label{display:block;font-size:11px;font-weight:600;margin-bottom:2px}
.pw-field input{width:100%;border:1px solid #999;padding:3px 5px;font-size:11px;font-family:'Inter',sans-serif}
.upd-section{margin-bottom:10px}
.upd-section h3{font-size:12px;font-weight:700;color:var(--navy);border-bottom:1px solid #d0d0d0;padding-bottom:2px;margin-bottom:4px}
.upd-info{font-size:11px;color:#333;line-height:1.5}
.upd-check-btn{display:inline-flex;align-items:center;gap:5px;background:var(--navy);color:#fff;border:none;padding:4px 12px;font-size:11px;font-weight:600;cursor:pointer;margin-top:4px;font-family:'Inter',sans-serif}
.eff-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #eee;font-size:11px}
.eff-row label{font-weight:600;color:#333}
.eff-row select{font-family:'Inter',sans-serif}
.act-wrap{display:flex;gap:10px;margin-bottom:10px}
.act-col{flex:1;border:1px solid #a0a0a0}
.act-col-head{background:var(--navy);color:#fff;padding:3px 8px;font-size:11px;font-weight:700;display:flex;justify-content:space-between}
.act-row{display:flex;justify-content:space-between;padding:3px 8px;font-size:11px;border-bottom:1px solid #e0e0e0}
.act-row:nth-child(even){background:#f0f4fa}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{background:var(--navy);color:#fff;text-align:left;padding:3px 6px;font-weight:700}
.tbl td{padding:3px 6px;border:1px solid #c0c8d8}
.tbl tr:nth-child(even) td{background:#f0f4fa}
.kw-entry{display:flex;gap:5px;margin-bottom:5px}
.kw-entry input{flex:1;border:1px solid #999;padding:3px 5px;font-size:11px;font-family:'Inter',sans-serif}
.kw-item{display:flex;justify-content:space-between;align-items:center;padding:2px 6px;background:#f4f7fb;border:1px solid #d0d8e4;margin-bottom:2px;font-size:11px}
.kw-item button{background:none;border:none;color:var(--red);cursor:pointer;font-size:13px;font-weight:700}
.ss-row{display:flex;align-items:center;gap:6px;padding:5px 0;font-size:11px;font-weight:600;border-bottom:1px solid #eee}
</style>
